server:
  port: ${SERVER_PORT}
spring:
  application:
    name: blog_system_backend
  config:
    import: "optional:file:./.env[.properties]"
  datasource:
    url: jdbc:mysql://${SERVER_IP}:3306/blog_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update