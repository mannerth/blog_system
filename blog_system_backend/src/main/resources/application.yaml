server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: blog_system_backend
  config:
    import: "optional:file:./.env[.properties]"
  datasource:
    url: jdbc:mysql://${SERVER_IP}:3306/blog_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update

security:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-secret-key-at-least-32-characters}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  admin:
    username: ${ADMIN_USERNAME:}
    password: ${ADMIN_PASSWORD:}
